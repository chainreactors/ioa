<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="gr" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#800000"/>
      <stop offset="100%" stop-color="#ff4d4d"/>
    </linearGradient>
    <linearGradient id="gr2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#800000"/>
      <stop offset="100%" stop-color="#ff4d4d"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff4d4d" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#d90429" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#800000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="heavyGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Central energy pulse -->
  <circle cx="256" cy="256" r="200" fill="url(#pulse)"/>

  <!-- Orbital rings — three elliptical orbits crossing at center -->
  <g stroke="url(#gr)" fill="none" opacity="0.2" stroke-width="1.5">
    <ellipse cx="256" cy="256" rx="170" ry="65" transform="rotate(-30 256 256)"/>
    <ellipse cx="256" cy="256" rx="170" ry="65" transform="rotate(30 256 256)"/>
    <ellipse cx="256" cy="256" rx="170" ry="65" transform="rotate(90 256 256)"/>
  </g>

  <!-- Message streams — thick glowing arcs forming a triangle -->
  <g filter="url(#glow)">
    <!-- A → B -->
    <path d="M256,108 Q380,180 376,348"
          fill="none" stroke="url(#gr)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <!-- B → C -->
    <path d="M370,355 Q256,440 142,335"
          fill="none" stroke="url(#gr)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <!-- C → A -->
    <path d="M136,325 Q130,180 256,112"
          fill="none" stroke="url(#gr2)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Inner triangle frame — sharp geometric accent -->
  <polygon points="256,105 380,352 132,332"
           fill="none" stroke="#ff4d4d" stroke-width="1" opacity="0.15"/>

  <!-- Node A (top) — large hexagon -->
  <g filter="url(#heavyGlow)" transform="translate(256,105)">
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14"
             fill="#d90429" fill-opacity="0.4" stroke="url(#gr)" stroke-width="3" stroke-linejoin="round"/>
    <circle r="6" fill="#ffffff"/>
  </g>

  <!-- Node B (bottom-right) — large hexagon -->
  <g filter="url(#heavyGlow)" transform="translate(380,352)">
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14"
             fill="#d90429" fill-opacity="0.4" stroke="url(#gr)" stroke-width="3" stroke-linejoin="round"/>
    <circle r="6" fill="#ffffff"/>
  </g>

  <!-- Node C (bottom-left) — large hexagon -->
  <g filter="url(#heavyGlow)" transform="translate(132,332)">
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14"
             fill="#d90429" fill-opacity="0.4" stroke="url(#gr)" stroke-width="3" stroke-linejoin="round"/>
    <circle r="6" fill="#ffffff"/>
  </g>

  <!-- Center nexus — the Space convergence point -->
  <g filter="url(#heavyGlow)">
    <circle cx="256" cy="262" r="18" fill="#d90429" fill-opacity="0.15" stroke="url(#gr)" stroke-width="2"/>
    <circle cx="256" cy="262" r="8" fill="#ffffff" opacity="0.9"/>
    <circle cx="256" cy="262" r="3" fill="#ff4d4d"/>
  </g>

  <!-- Energy particles along arcs -->
  <g filter="url(#glow)">
    <circle cx="320" cy="170" r="4" fill="#ff4d4d" opacity="0.8"/>
    <circle cx="390" cy="280" r="3" fill="#ff4d4d" opacity="0.6"/>
    <circle cx="300" cy="400" r="4" fill="#ff4d4d" opacity="0.8"/>
    <circle cx="190" cy="395" r="3" fill="#ff4d4d" opacity="0.6"/>
    <circle cx="130" cy="250" r="4" fill="#ff4d4d" opacity="0.8"/>
    <circle cx="195" cy="145" r="3" fill="#ff4d4d" opacity="0.6"/>
  </g>

  <!-- Outer ring accent -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#gr)" stroke-width="1" opacity="0.1"/>
  <circle cx="256" cy="256" r="230" fill="none" stroke="#ff4d4d" stroke-width="0.5" opacity="0.06"/>
</svg>
