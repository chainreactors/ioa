<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="gr" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#800000"/>
      <stop offset="100%" stop-color="#ff4d4d"/>
    </linearGradient>
    <radialGradient id="spaceGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#d90429" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d90429" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5"
            markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#ff4d4d" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Space boundary — subtle rounded region -->
  <circle cx="256" cy="256" r="190" fill="url(#spaceGlow)"/>
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#gr)" stroke-width="1.5"
          stroke-dasharray="12 8" opacity="0.2"/>

  <!-- Message arcs with directional arrows (curved paths between nodes) -->
  <!-- Node A (top) → Node B (bottom-right) -->
  <path d="M256,120 Q340,200 370,340"
        fill="none" stroke="url(#gr)" stroke-width="2.5" opacity="0.5"
        stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- Node B (bottom-right) → Node C (bottom-left) -->
  <path d="M370,360 Q256,420 150,340"
        fill="none" stroke="url(#gr)" stroke-width="2.5" opacity="0.5"
        stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- Node C (bottom-left) → Node A (top) -->
  <path d="M140,320 Q170,200 256,130"
        fill="none" stroke="url(#gr)" stroke-width="2.5" opacity="0.5"
        stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- Ref arc — Node A → Node C (cross-reference, lighter) -->
  <path d="M245,115 Q200,230 148,310"
        fill="none" stroke="#ff4d4d" stroke-width="1.2" opacity="0.2"
        stroke-dasharray="4 6" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- Ref arc — Node B → Node A (cross-reference, lighter) -->
  <path d="M365,330 Q320,210 262,125"
        fill="none" stroke="#ff4d4d" stroke-width="1.2" opacity="0.2"
        stroke-dasharray="4 6" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- Node A (top) — hexagon, slightly larger = primary agent -->
  <g filter="url(#glow)">
    <polygon points="256,88 274,98 274,118 256,128 238,118 238,98"
             fill="#d90429" fill-opacity="0.35" stroke="url(#gr)" stroke-width="2.5"/>
    <circle cx="256" cy="108" r="4" fill="#ffffff"/>
  </g>

  <!-- Node B (bottom-right) — hexagon -->
  <g filter="url(#glow)">
    <polygon points="376,328 394,338 394,358 376,368 358,358 358,338"
             fill="#d90429" fill-opacity="0.3" stroke="url(#gr)" stroke-width="2"/>
    <circle cx="376" cy="348" r="3.5" fill="#ffffff"/>
  </g>

  <!-- Node C (bottom-left) — hexagon -->
  <g filter="url(#glow)">
    <polygon points="140,308 158,318 158,338 140,348 122,338 122,318"
             fill="#d90429" fill-opacity="0.3" stroke="url(#gr)" stroke-width="2"/>
    <circle cx="140" cy="328" r="3.5" fill="#ffffff"/>
  </g>

  <!-- Small message dots along arcs — representing in-flight messages -->
  <circle cx="310" cy="220" r="3" fill="#ff4d4d" opacity="0.6" filter="url(#glow)"/>
  <circle cx="260" cy="390" r="3" fill="#ff4d4d" opacity="0.6" filter="url(#glow)"/>
  <circle cx="185" cy="225" r="3" fill="#ff4d4d" opacity="0.6" filter="url(#glow)"/>
</svg>
