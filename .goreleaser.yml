version: 2

project_name: ioa

builds:
  - id: ioa
    main: ./cmd/ioa
    binary: "{{ .ProjectName }}"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

upx:
  - enabled: true
    goos: [linux, windows]
    goarch:
      - amd64

archives:
  - id: ioa
    ids: [ioa]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - binary

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: desc
  filters:
    exclude:
      - '^MERGE'
      - "{{ .Tag }}"
      - "^docs"

release:
  github:
    owner: chainreactors
    name: ioa
  draft: true
  prerelease: auto
  replace_existing_draft: true
  replace_existing_artifacts: true
  mode: replace
  name_template: "{{ .Tag }}"
